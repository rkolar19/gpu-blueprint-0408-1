# Default values for gpu-blueprint-0408-1.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
# GPU Partitioning Strategy (MIG Emulation)
gpuConfig:
  model: "Llama-3-70B-INT4"
  vramReserved: "40GB"

vllm:
  image: hashicorp/http-echo # Mocking vLLM with a lightweight echo server
  replicaCount: 1
  port: 8000

agents:
  agent1:
    image: alpine
    replicaCount: 2
    logLevel: "DEBUG"
  agent2:
    image: busybox
    replicaCount: 3
    logLevel: "INFO"
    args:
      - |
        while true; do
          echo "Agent2 (Busybox custom!) pinging the brain..."
          wget -qO- http://{{ $.Release.Name }}-vllm:80
          sleep 10;
        done
# values.yaml update
realvllm:
  image: vllm/vllm-openai:latest
  model: "meta-llama/Meta-Llama-3-70B-Instruct"
  gpuLimit: 1 # Requests 1 GPU (or a MIG slice)
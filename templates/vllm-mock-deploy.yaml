apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-vllm-mock
  labels:
    app.kubernetes.io/name: vllm-mock
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vllm-mock
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vllm-mock
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: vllm-mock
          image: "busybox:latest"
          command: ["sleep", "3600"]
